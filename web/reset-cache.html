<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清理浏览器缓存｜国学万宝匣</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ee;
      color: #2d261f;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #d9ccb9;
      border-radius: 8px;
      background: #fffaf2;
      box-shadow: 0 12px 28px rgba(45, 38, 31, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在清理浏览器缓存</h1>
    <p id="status">请稍候，完成后会自动返回国学万宝匣。</p>
  </main>
  <script>
    (async function resetBrowserCache() {
      const status = document.getElementById('status');

      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }

        status.textContent = '缓存已清理，正在重新打开国学万宝匣。';
      } catch (error) {
        status.textContent = '缓存清理未完全成功，将继续尝试重新打开国学万宝匣。';
      }

      window.location.replace('/?cache_reset=' + Date.now());
    })();
  </script>
</body>
</html>
